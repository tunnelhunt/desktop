name: Build and Release Desktop Client

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: ''
          - platform: 'ubuntu-22.04'
            args: ''
          - platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Update version from Git tag
        shell: bash
        run: |
          node -e "
          const fs = require('fs');
          const tag = process.env.GITHUB_REF_NAME;
          if (tag && /^v?\d+/.test(tag)) {
            const version = tag.startsWith('v') ? tag.substring(1) : tag;
            if (fs.existsSync('package.json')) {
              const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
              pkg.version = version;
              fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n', 'utf8');
              console.log('Updated package.json version to:', version);
            }
            if (fs.existsSync('src-tauri/tauri.conf.json')) {
              const conf = JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json', 'utf8'));
              conf.version = version;
              fs.writeFileSync('src-tauri/tauri.conf.json', JSON.stringify(conf, null, 2) + '\n', 'utf8');
              console.log('Updated tauri.conf.json version to:', version);
            }
            if (fs.existsSync('src-tauri/Cargo.toml')) {
              let cargo = fs.readFileSync('src-tauri/Cargo.toml', 'utf8');
              cargo = cargo.replace(/^version\s*=\s*\".*\"/m, 'version = \"' + version + '\"');
              fs.writeFileSync('src-tauri/Cargo.toml', cargo, 'utf8');
              console.log('Updated Cargo.toml version to:', version);
            }
          } else {
            console.log('No version tag found (ref: ' + tag + '). Skipping version update.');
          }
          "

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install system dependencies (Linux only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf dbus

      - name: Install Node dependencies
        run: |
          npm install

      - name: Build and Release Tauri App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: '.'
          tagName: ${{ github.ref_name }}
          releaseName: 'Tunnelhunt Desktop v__VERSION__'
          releaseBody: 'Tunnelhunt Desktop Client Release (Linux, macOS, Windows)'
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
